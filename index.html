<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PARTYLINE | Squad Comms</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ===== TOKENS =====
           Palette: void #0a0a0f, panel #14141c, neon-lime #c6ff3f (primary),
           plasma-violet #8b5cf6 (secondary/voice), signal-red #ff3860 (mute/leave),
           bone #f2f2f0 (text)
           Type: Rajdhani (display, condensed/technical) + Space Grotesk (body) + JetBrains Mono (data/tags)
           Signature: hexagonal "squad" tiles with live rank-style speaking rings on voice avatars
        */
        :root {
            --accent: #c6ff3f;
            --accent-glow: rgba(198, 255, 63, 0.28);
            --accent-strong: rgba(198, 255, 63, 0.65);
            --voice: #8b5cf6;
            --voice-glow: rgba(139, 92, 246, 0.45);
            --danger: #ff3860;
            --glass-op: 0.08;
            --glass-blur: 40px;
            --glass-sat: 220%;
            --border-light: rgba(255, 255, 255, 0.14);
            --border-dark: rgba(255, 255, 255, 0.04);
            --bg-color: #0a0a0f;
            --panel-color: #101018;
            --text-color: #f2f2f0;
            --font-display: 'Rajdhani', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --spring: cubic-bezier(0.16, 1, 0.3, 1);
            --tx: 0px; --ty: 0px;
        }

        [data-theme="light"] {
            --bg-color: #eef0f4; --panel-color: #ffffff; --text-color: #10121a;
            --glass-op: 0.7; --border-light: rgba(255, 255, 255, 0.9); --border-dark: rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-body); scrollbar-width: none; }
        ::-webkit-scrollbar { display: none; }
        ::selection { background: var(--accent); color: #000; }

        body { background: var(--bg-color); color: var(--text-color); height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: 0.5s; }

        #bg-canvas { position: fixed; inset: -10%; z-index: -3; background: radial-gradient(circle at 50% 50%, #15151f, var(--bg-color)); background-size: cover; background-position: center; filter: blur(var(--glass-blur)) brightness(0.55); transform: translate(calc(var(--tx) * -0.4), calc(var(--ty) * -0.4)); transition: transform 0.2s linear; }
        .ambient-mesh { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 15% 85%, var(--accent-glow), transparent 55%), radial-gradient(circle at 85% 15%, var(--voice-glow), transparent 55%); mix-blend-mode: screen; pointer-events: none; animation: ambientPulse 9s infinite alternate ease-in-out; }
        @keyframes ambientPulse { 0% { opacity: 0.5; transform: scale(1); } 100% { opacity: 0.85; transform: scale(1.05); } }

        .nexus-grid { display: grid; gap: 24px; width: 95vw; height: 88dvh; max-width: 1700px; opacity: 0; pointer-events: none; transition: opacity 0.8s ease; }
        .mode-computer { grid-template-columns: 300px 1fr 300px; }
        .mode-mobile { width: 400px; grid-template-columns: 1fr; }
        .mode-mobile .side-pill { display: none; }
        .mode-watch { width: 380px; height: 380px; aspect-ratio: 1/1; border-radius: 50% !important; margin: auto; grid-template-columns: 1fr; overflow: hidden; border: 12px solid var(--border-light); box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .mode-watch .side-pill { display: none; }
        .mode-watch .pill-header { padding-top: 45px; justify-content: center; }
        .mode-watch .input-dock { padding-bottom: 45px; }

        .hyper-pill {
            background: linear-gradient(150deg, rgba(255,255,255,var(--glass-op)), rgba(255,255,255,calc(var(--glass-op)/3)));
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
            background-color: var(--panel-color);
            border-radius: 26px; border: 1px solid var(--border-dark); border-top: 1.5px solid var(--border-light); border-left: 1.5px solid var(--border-light);
            box-shadow: 0 30px 60px rgba(0,0,0,0.45), inset 2px 2px 16px rgba(255,255,255,0.04);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
            animation: slideUp 0.7s var(--spring) forwards;
        }
        @keyframes slideUp { 0% { transform: translateY(40px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        .pill-header { padding: 22px 26px; font-family: var(--font-display); font-weight: 700; font-size: 1.15rem; letter-spacing: 0.5px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-dark); }

        #sketch-wrap { flex: 1; margin: 18px; border-radius: 18px; background: rgba(0,0,0,0.25); overflow: hidden; cursor: crosshair; border: 1px dashed var(--border-light); }
        canvas { width: 100%; height: 100%; touch-action: none; }
        .btn-liquid { margin: 0 18px 18px; padding: 16px; border-radius: 14px; background: var(--accent); color: #050505; border: none; font-family: var(--font-display); font-weight: 700; font-size: 1rem; letter-spacing: 0.5px; cursor: pointer; transition: 0.25s; text-transform: uppercase; box-shadow: 0 10px 20px var(--accent-glow); }
        .btn-liquid:hover { transform: translateY(-2px) scale(1.02); }
        .btn-liquid:active { transform: scale(0.98); }

        #view { flex: 1; padding: 26px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        .dm-header { background: var(--voice); color: #fff; padding: 6px 16px; border-radius: 10px; font-size: 0.75rem; cursor: pointer; display: none; font-weight: 700; font-family: var(--font-mono); box-shadow: 0 5px 15px var(--voice-glow); }

        .bubble-wrap { display: flex; flex-direction: column; max-width: 78%; animation: bubbleIn 0.4s var(--spring); }
        .bubble-wrap.me { align-self: flex-end; align-items: flex-end; }
        .bubble-wrap.them { align-self: flex-start; align-items: flex-start; }
        @keyframes bubbleIn { 0% { transform: scale(0.85) translateY(16px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

        .bubble-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 0.72rem; font-family: var(--font-mono); font-weight: 700; opacity: 0.7; padding: 0 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .meta-pfp { width: 20px; height: 20px; border-radius: 6px; object-fit: cover; border: 1px solid var(--accent); }
        .msg-time { font-size: 0.65rem; opacity: 0.5; margin-left: 5px; }

        .bubble { padding: 14px 20px; border-radius: 16px; font-size: 1rem; word-wrap: break-word; overflow-wrap: break-word; position: relative; line-height: 1.45; }
        .bubble-wrap.me .bubble { background: linear-gradient(135deg, var(--accent), var(--accent-strong)); color: #050505; border-bottom-right-radius: 4px; box-shadow: 0 8px 18px var(--accent-glow); font-weight: 500; }
        .bubble-wrap.them .bubble { background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border: 1px solid var(--border-dark); border-top: 1px solid var(--border-light); border-bottom-left-radius: 4px; }

        .bubble img { max-width: 100%; border-radius: 12px; margin-top: 10px; }
        .del-btn { position: absolute; top: -8px; right: -8px; background: var(--danger); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; cursor: pointer; opacity: 0; transition: 0.3s; border: 2px solid var(--panel-color); }
        .bubble-wrap:hover .del-btn { opacity: 1; }

        .announcement { align-self: center; background: linear-gradient(135deg, var(--voice), #a78bfa); color: #fff; font-family: var(--font-display); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; padding: 20px 34px; border-radius: 18px; border: 2px solid rgba(255,255,255,0.3); max-width: 90%; margin: 16px 0; box-shadow: 0 0 40px var(--voice-glow); }

        .input-dock { padding: 18px 26px; background: rgba(0,0,0,0.18); border-top: 1px solid var(--border-dark); display: flex; gap: 12px; }
        .input-pill { flex: 1; display: flex; align-items: center; background: rgba(255,255,255,0.04); border: 1px solid var(--border-dark); border-top: 1px solid var(--border-light); border-radius: 16px; padding: 4px 4px 4px 22px; transition: 0.3s; }
        .input-pill:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
        .input-pill input { flex: 1; background: transparent; border: none; color: var(--text-color); font-size: 1rem; outline: none; font-family: var(--font-body); }

        .action-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; color: var(--text-color); opacity: 0.6; transition: 0.3s; }
        .action-icon:hover { opacity: 1; background: rgba(255,255,255,0.08); }
        .send-btn { width: 42px; height: 42px; border-radius: 12px; background: var(--accent); color: #050505; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px var(--accent-glow); }
        .send-btn:hover { transform: scale(1.08); }
        #typing-indicator { padding: 8px 30px; font-size: 0.75rem; font-family: var(--font-mono); font-weight: 700; color: var(--accent); opacity: 0; transition: 0.3s; height: 28px; text-transform: uppercase; letter-spacing: 0.5px; }

        .profile-hero { padding: 34px 20px; text-align: center; border-bottom: 1px solid var(--border-dark); }
        .main-pfp { width: 84px; height: 84px; border-radius: 20px; object-fit: cover; border: 3px solid var(--accent); box-shadow: 0 10px 30px var(--accent-glow); margin: 0 auto 14px; display: none; }
        .presence-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .user-node { display: flex; align-items: center; gap: 13px; padding: 13px 16px; border-radius: 14px; background: rgba(255,255,255,0.025); cursor: pointer; transition: 0.25s; position: relative; font-weight: 600; font-size: 0.95rem; }
        .user-node:hover { background: rgba(255,255,255,0.06); transform: translateX(6px); }
        .user-node.me { cursor: default; opacity: 0.85; }
        .user-node.me:hover { transform: none; background: rgba(255,255,255,0.025); }
        .status-orb { width: 9px; height: 9px; border-radius: 50%; background: #2ed573; flex-shrink: 0; }
        .user-node.me .status-orb { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .dm-alert { position: absolute; right: 18px; width: 11px; height: 11px; background: var(--danger); border-radius: 50%; animation: ping 1.5s infinite; display: none; }
        .user-node.has-unread .dm-alert { display: block; }
        @keyframes ping { 0% { box-shadow: 0 0 0 0 rgba(255,56,96,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,56,96,0); } 100% { box-shadow: 0 0 0 0 rgba(255,56,96,0); } }

        /* VOICE */
        .voice-bar { margin: 0 16px 14px; padding: 14px 16px; border-radius: 16px; background: rgba(139, 92, 246, 0.08); border: 1px solid rgba(139, 92, 246, 0.25); display: none; flex-direction: column; gap: 10px; }
        .voice-bar.active { display: flex; }
        .voice-bar-head { display: flex; align-items: center; justify-content: space-between; font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--voice); font-weight: 700; }
        .voice-members { display: flex; flex-wrap: wrap; gap: 8px; }
        .voice-chip { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); padding: 5px 10px 5px 5px; border-radius: 100px; font-size: 0.78rem; font-weight: 600; }
        .voice-chip .vc-dot { width: 22px; height: 22px; border-radius: 50%; background: var(--voice); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #fff; flex-shrink: 0; transition: box-shadow 0.15s; }
        .voice-chip.speaking .vc-dot { box-shadow: 0 0 0 3px var(--voice-glow), 0 0 14px var(--voice); }
        .voice-chip.muted .vc-dot::after { content: '\f131'; font-family: "Font Awesome 6 Free"; font-weight: 900; }
        .voice-controls { display: flex; gap: 8px; }
        .vc-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-family: var(--font-display); font-weight: 700; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.2s; background: rgba(255,255,255,0.06); color: var(--text-color); }
        .vc-btn:hover { background: rgba(255,255,255,0.12); }
        .vc-btn.danger { background: var(--danger); color: #fff; }
        .vc-btn.on { background: var(--voice); color: #fff; }
        .join-voice-btn { margin: 0 16px 14px; padding: 14px; border-radius: 14px; background: linear-gradient(135deg, var(--voice), #a78bfa); color: #fff; border: none; font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 10px 20px var(--voice-glow); transition: 0.25s; }
        .join-voice-btn:hover { transform: translateY(-2px); }
        .join-voice-btn.hidden { display: none; }
        .user-node.in-voice { border: 1px solid rgba(139,92,246,0.4); }
        .user-node .voice-ring { width: 10px; height: 10px; border-radius: 50%; background: var(--voice); margin-left: auto; flex-shrink: 0; }
        .user-node .voice-ring.speaking { box-shadow: 0 0 0 3px var(--voice-glow); animation: voicePulse 0.9s infinite; }
        @keyframes voicePulse { 0%,100% { box-shadow: 0 0 0 2px var(--voice-glow); } 50% { box-shadow: 0 0 0 5px var(--voice-glow); } }

        .cc-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(26px); z-index: 10000; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.4s; }
        .cc-panel { background: rgba(16,16,24,0.92); border: 1px solid var(--border-light); border-radius: 26px; width: 90%; max-width: 600px; padding: 36px; box-shadow: 0 50px 100px rgba(0,0,0,0.8); transform: scale(0.92); transition: 0.4s var(--spring); max-height: 90dvh; overflow-y: auto; }
        [data-theme="light"] .cc-panel { background: rgba(255,255,255,0.95); }
        .cc-group { margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 18px; border-radius: 18px; border: 1px solid var(--border-dark); }
        .cc-label { display: block; font-family: var(--font-mono); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 13px; opacity: 0.6; }
        .color-grid { display: flex; gap: 10px; flex-wrap: wrap; }
        .c-dot { width: 32px; height: 32px; border-radius: 10px; cursor: pointer; transition: 0.25s; border: 2px solid transparent; }
        .c-dot.active { border-color: currentColor; transform: scale(1.15); box-shadow: 0 0 14px currentColor; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        select { width: 100%; padding: 13px; border-radius: 12px; background: rgba(255,255,255,0.05); color: var(--text-color); border: 1px solid var(--border-dark); outline: none; cursor: pointer; }
        select option { background: #14141c; color: #fff; }

        .dock { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(20,20,28,0.6); backdrop-filter: blur(36px); border: 1px solid var(--border-dark); border-top: 1.5px solid var(--border-light); padding: 9px 16px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: 0.6s var(--spring); z-index: 9000; }
        .dock.hidden { transform: translate(-50%, 150%); }
        .dock-btn { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.05rem; color: var(--text-color); cursor: pointer; transition: 0.25s; }
        .dock-btn:hover, .dock-btn.active { background: var(--accent); color: #050505; transform: translateY(-3px); }
        .dock-div { width: 2px; background: var(--border-dark); margin: 5px; border-radius: 2px; }
        .stealth-pull { position: fixed; bottom: -40px; left: 50%; transform: translateX(-50%); width: 70px; height: 5px; background: var(--border-light); border-radius: 10px; cursor: pointer; transition: 0.4s; z-index: 8999; }
        .stealth-pull.visible { bottom: 15px; }

        #gate { position: fixed; inset: 0; background: var(--bg-color); z-index: 20000; display: flex; align-items: center; justify-content: center; }
        .gate-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(40px); border: 1px solid var(--border-dark); border-top: 1.5px solid var(--border-light); border-radius: 32px; padding: 56px 46px; width: 440px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .gate-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-dark); color: var(--text-color); padding: 18px; border-radius: 14px; margin-bottom: 22px; font-size: 1.05rem; text-align: center; outline: none; font-family: var(--font-body); }
        .gate-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
        .gate-title { font-family: var(--font-display); font-weight: 900; font-size: 2.6rem; letter-spacing: 1px; }
    </style>
</head>
<body onmousemove="handleParallax(event)">
    <div id="bg-canvas"></div>
    <div class="ambient-mesh"></div>

    <div id="gate">
        <div class="gate-card" id="gate-card">
            <i class="fas fa-gamepad" style="font-size: 3rem; color: var(--accent); margin-bottom: 18px;"></i>
            <h1 class="gate-title">PARTYLINE</h1>
            <p style="opacity: 0.55; font-size: 0.8rem; margin-bottom: 28px; letter-spacing: 2px; font-family: var(--font-mono); text-transform: uppercase;">Squad text, voice &amp; sketch</p>

            <div id="step-login">
                <input type="text" id="name-in" class="gate-input" placeholder="Pick a gamertag" autocomplete="off" maxlength="18">
                <button class="btn-liquid" id="auth-btn" style="width: 100%; margin: 0;" onclick="processLogin()">JOIN THE PARTY</button>
            </div>

            <div id="step-enter" style="display: none;">
                <h3 id="welcome-msg" style="margin-bottom: 22px; color: var(--accent); font-family: var(--font-display); font-weight: 700; font-size: 1.3rem;"></h3>
                <button class="btn-liquid" style="width: 100%; margin: 0;" onclick="requestAndEnter()">ENTER LOBBY</button>
            </div>
        </div>
    </div>

    <div class="nexus-grid mode-computer" id="ui">

        <aside class="hyper-pill side-pill">
            <div class="pill-header"><span>Scrawl Pad</span><i class="fas fa-eraser" style="cursor:pointer; opacity:0.5; font-size: 0.9rem;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.5" onclick="ctx.clearRect(0,0,canvas.width,canvas.height)"></i></div>
            <div id="sketch-wrap"><canvas id="canvas"></canvas></div>
            <button class="btn-liquid" onclick="broadcastSketch()">SEND SKETCH</button>
        </aside>

        <main class="hyper-pill">
            <div class="pill-header">
                <span id="chat-title" style="color: var(--accent);">Main Lobby</span>
                <div class="dm-header" id="dm-back" onclick="closeDM()">Back to Lobby</div>
            </div>

            <div id="view"></div>
            <div id="typing-indicator"></div>

            <div class="input-dock">
                <div class="input-pill">
                    <input type="text" id="msg-input" placeholder="Callout to the squad..." onkeypress="if(event.key==='Enter') push()" oninput="sendTyping()">
                    <div class="action-icon" id="announce-btn" onclick="sendAnnounce()" title="Broadcast to squad"><i class="fas fa-bullhorn"></i></div>
                    <button class="send-btn" onclick="push()"><i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </main>

        <aside class="hyper-pill side-pill">
            <div class="profile-hero">
                <img id="local-pfp" class="main-pfp" src="">
                <h2 id="user-display" style="font-family: var(--font-display); font-weight: 700; letter-spacing: 0.5px;"></h2>
                <div style="color: var(--accent); font-size: 0.75rem; font-weight: 700; margin-top: 8px; text-transform: uppercase; font-family: var(--font-mono); letter-spacing: 0.5px;"><i class="fas fa-shield-alt"></i> Encrypted Comms</div>
            </div>

            <button class="join-voice-btn" id="join-voice-btn" onclick="joinVoice()"><i class="fas fa-headset"></i> Join Voice Chat</button>
            <div class="voice-bar" id="voice-bar">
                <div class="voice-bar-head"><span><i class="fas fa-tower-broadcast"></i> Voice Channel</span><span id="voice-count">0</span></div>
                <div class="voice-members" id="voice-members"></div>
                <div class="voice-controls">
                    <button class="vc-btn" id="mute-btn" onclick="toggleMute()"><i class="fas fa-microphone"></i> Mute</button>
                    <button class="vc-btn" id="deafen-btn" onclick="toggleDeafen()"><i class="fas fa-volume-high"></i> Deafen</button>
                    <button class="vc-btn danger" onclick="leaveVoice()"><i class="fas fa-phone-slash"></i></button>
                </div>
            </div>

            <div class="pill-header" style="border:none; padding-bottom: 0; font-size: 0.85rem; opacity: 0.5;">Squad Online</div>
            <div class="presence-list" id="online-list"></div>
        </aside>
    </div>

    <div class="dock" id="dock">
        <div class="dock-btn active" onclick="setMode('computer', this)"><i class="fas fa-desktop"></i></div>
        <div class="dock-btn" onclick="setMode('mobile', this)"><i class="fas fa-mobile-alt"></i></div>
        <div class="dock-btn" onclick="setMode('watch', this)"><i class="fas fa-dot-circle"></i></div>
        <div class="dock-div"></div>
        <div class="dock-btn" onclick="document.getElementById('bg-up').click()"><i class="fas fa-image"></i></div>
        <div class="dock-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i></div>
        <div class="dock-btn" onclick="toggleCC()"><i class="fas fa-sliders-h"></i></div>
        <div class="dock-btn" onclick="toggleStealth()"><i class="fas fa-eye-slash"></i></div>
    </div>
    <div class="stealth-pull" id="dock-reveal" onclick="toggleStealth()"></div>

    <div class="cc-overlay" id="cc" onclick="if(event.target === this) toggleCC()">
        <div class="cc-panel" id="cc-p">
            <h2 style="margin-bottom: 26px; font-family: var(--font-display); font-weight: 900; font-size: 1.9rem;">Loadout</h2>

            <div class="cc-group">
                <span class="cc-label">Avatar</span>
                <button class="btn-liquid" style="width:100%; margin:0; background:rgba(255,255,255,0.08); color:var(--text-color); box-shadow:none;" onclick="document.getElementById('pfp-up').click()"><i class="fas fa-camera"></i> Update Photo</button>
                <input type="file" id="pfp-up" hidden accept="image/*" onchange="handlePfp(this)">
            </div>

            <div class="cc-group">
                <span class="cc-label">Team Color</span>
                <div class="color-grid">
                    <div class="c-dot active" style="background:#c6ff3f; color:#c6ff3f;" onclick="setCol('#c6ff3f', this)"></div>
                    <div class="c-dot" style="background:#8b5cf6; color:#8b5cf6;" onclick="setCol('#8b5cf6', this)"></div>
                    <div class="c-dot" style="background:#00e5ff; color:#00e5ff;" onclick="setCol('#00e5ff', this)"></div>
                    <div class="c-dot" style="background:#ff3860; color:#ff3860;" onclick="setCol('#ff3860', this)"></div>
                    <div class="c-dot" style="background:#ff9f0a; color:#ff9f0a;" onclick="setCol('#ff9f0a', this)"></div>
                    <div class="c-dot" style="background:#ff2d9c; color:#ff2d9c;" onclick="setCol('#ff2d9c', this)"></div>
                    <div class="c-dot" style="background:#4ade80; color:#4ade80;" onclick="setCol('#4ade80', this)"></div>
                    <div class="c-dot" style="background:#fde047; color:#fde047;" onclick="setCol('#fde047', this)"></div>
                    <div class="c-dot" style="background:#38bdf8; color:#38bdf8;" onclick="setCol('#38bdf8', this)"></div>
                    <div class="c-dot" style="background:#f472b6; color:#f472b6;" onclick="setCol('#f472b6', this)"></div>
                    <div class="c-dot" style="background:#ffffff; color:#ffffff;" onclick="setCol('#ffffff', this)"></div>
                    <div class="c-dot" style="background:#a1a1aa; color:#a1a1aa;" onclick="setCol('#a1a1aa', this)"></div>
                </div>
            </div>

            <div class="cc-group" style="display: flex; gap: 18px;">
                <div style="flex: 1;">
                    <span class="cc-label">Glass Frost</span>
                    <input type="range" min="10" max="150" value="40" oninput="document.documentElement.style.setProperty('--glass-blur', this.value+'px'); localStorage.setItem('pl_blur', this.value);">
                </div>
                <div style="flex: 1;">
                    <span class="cc-label">Glass Viscosity</span>
                    <input type="range" min="2" max="50" value="8" oninput="document.documentElement.style.setProperty('--glass-op', this.value/100); localStorage.setItem('pl_op', this.value);">
                </div>
            </div>

            <div class="cc-group" style="display: flex; gap: 18px;">
                <div style="flex: 1;">
                    <span class="cc-label">Typography</span>
                    <select onchange="document.documentElement.style.setProperty('--font-body', this.value); localStorage.setItem('pl_fnt', this.value);">
                        <option value="'Space Grotesk', sans-serif">Space Grotesk</option>
                        <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
                        <option value="'Rajdhani', sans-serif">Rajdhani</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <span class="cc-label">Sound FX</span>
                    <button id="snd-btn" class="btn-liquid" style="margin:0; padding:13px; background:var(--accent); color:#050505;" onclick="toggleSnd()">ON</button>
                </div>
            </div>

            <div class="cc-group">
                <span class="cc-label">Push Notifications</span>
                <button id="notif-btn" class="btn-liquid" style="width:100%; margin:0; background:rgba(255,255,255,0.08); color:var(--text-color); box-shadow:none;" onclick="requestAndEnter()">ENABLE NOTIFS</button>
            </div>

            <button class="btn-liquid" style="width: 100%; margin: 0;" onclick="toggleCC()">APPLY LOADOUT</button>
        </div>
    </div>

    <input type="file" id="bg-up" hidden accept="image/*" onchange="handleBg(this)">

    <script>
        // GLOBALS
        let client, chanMain, chanDM, user, receivedIds = new Set();
        let activeDM = null, unreadDMs = new Set();
        const secret = "partyline_v1";
        let soundEnabled = true, typingTimeout;

        // AUDIO & NOTIFICATIONS (message sfx)
        const sndOut = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3'); sndOut.volume = 0.4;
        const sndIn = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3'); sndIn.volume = 0.4;

        function playSnd(t) { if(!soundEnabled) return; if(t==='out'){sndOut.currentTime=0;sndOut.play().catch(()=>{});} else{sndIn.currentTime=0;sndIn.play().catch(()=>{});} }
        function toggleSnd() { soundEnabled = !soundEnabled; const b = document.getElementById('snd-btn'); b.innerText = soundEnabled ? "ON" : "OFF"; b.style.background = soundEnabled ? "var(--accent)" : "rgba(255,255,255,0.08)"; b.style.color = soundEnabled ? "#050505" : "var(--text-color)"; localStorage.setItem('pl_snd', soundEnabled); }

        function updateNotifUI(perm) {
            const btn = document.getElementById('notif-btn');
            if(perm === 'granted') { btn.innerText = "NOTIFS: ON"; btn.style.background = "var(--accent)"; btn.style.color = "#050505"; }
            else if(perm === 'denied') { btn.innerText = "NOTIFS: BLOCKED"; btn.style.background = "var(--danger)"; btn.style.color = "white"; }
            else { btn.innerText = "ENABLE NOTIFS"; btn.style.background = "rgba(255,255,255,0.08)"; btn.style.color = "var(--text-color)"; }
        }
        function sendDesktopNotification(title, body, icon) {
            if ("Notification" in window && Notification.permission === "granted" && document.hidden) {
                new Notification(title, { body: body, icon: icon || 'https://cdn-icons-png.flaticon.com/512/3114/3114883.png' });
            }
        }

        function handleParallax(e) { document.documentElement.style.setProperty('--tx', (window.innerWidth/2 - e.clientX)/60+'px'); document.documentElement.style.setProperty('--ty', (window.innerHeight/2 - e.clientY)/60+'px'); }

        // BOOT & IDENTITY
        window.onload = () => {
            let s = localStorage.getItem('pl_user');
            if(s) {
                user = s;
                document.getElementById('step-login').style.display = 'none';
                document.getElementById('welcome-msg').innerText = `Welcome back, ${user}.`;
                document.getElementById('step-enter').style.display = 'block';
            }
            loadSettings();
            if("Notification" in window) updateNotifUI(Notification.permission);
        };

        function processLogin() {
            let name = document.getElementById('name-in').value.trim();
            if(!name) { alert("Pick a gamertag first."); return; }
            name = name.slice(0, 18);

            const btn = document.getElementById('auth-btn');
            btn.innerText = "CHECKING LOBBY..."; btn.style.opacity = "0.5"; btn.style.pointerEvents = "none";

            const tempClient = new Ably.Realtime({ key: 'fVAQIA.kFtCvw:X6QXTzbh4Tbi1HUBiOQMlReiyw0uwkbOnEibDEM_VdA' });
            const tempChan = tempClient.channels.get('pl-flow');

            tempChan.presence.get((err, members) => {
                let isDuplicate = members.some(m => m.clientId === name);
                let tag = isDuplicate ? Math.floor(1000 + Math.random()*9000) : null;
                user = tag ? `${name}#${tag}` : name;

                localStorage.setItem('pl_user', user);
                tempClient.close();

                document.getElementById('step-login').style.display = 'none';
                document.getElementById('welcome-msg').innerText = `Gamertag Locked: ${user}`;
                document.getElementById('step-enter').style.display = 'block';
            });
        }

        function requestAndEnter() {
            if ("Notification" in window && Notification.permission === "default") {
                Notification.requestPermission().then(perm => { updateNotifUI(perm); ignite(); });
            } else { ignite(); }
        }

        function ignite() {
            document.getElementById('gate-card').style.animation = "none";
            document.getElementById('gate-card').style.transition = "0.4s var(--spring)";
            document.getElementById('gate-card').style.transform = "scale(0.9)";
            document.getElementById('gate-card').style.opacity = "0";
            setTimeout(() => { document.getElementById('gate').style.display = 'none'; document.getElementById('ui').style.opacity = '1'; document.getElementById('ui').style.pointerEvents = 'all'; initNetwork(); }, 400);
        }

        // NETWORK & HISTORY
        function initNetwork() {
            document.getElementById('user-display').innerText = user;
            const pfp = localStorage.getItem('pl_pfp'); if(pfp) { document.getElementById('local-pfp').src = pfp; document.getElementById('local-pfp').style.display = 'block'; }

            client = new Ably.Realtime({ key: 'fVAQIA.kFtCvw:X6QXTzbh4Tbi1HUBiOQMlReiyw0uwkbOnEibDEM_VdA', clientId: user });
            chanMain = client.channels.get('pl-flow');

            chanMain.history({limit: 50}, (err, page) => {
                if(!err && page.items) {
                    page.items.reverse().forEach(item => {
                        if(item.name === 'msg') ingest(item.data, false, true);
                        if(item.name === 'announce' && !receivedIds.has(item.data.id)) {
                            receivedIds.add(item.data.id);
                            renderAnnounce(dec(item.data.c), item.data.u, item.data.t);
                        }
                    });
                } else {
                    loadLocalHistoryGlobal();
                }
            });

            chanMain.subscribe('msg', p => ingest(p.data, false, false));
            chanMain.subscribe('announce', p => {
                if(!activeDM && p.data.u !== user && !receivedIds.has(p.data.id)) {
                    receivedIds.add(p.data.id); renderAnnounce(dec(p.data.c), p.data.u, p.data.t); playSnd('in');
                    sendDesktopNotification(`📢 SQUAD CALLOUT: ${p.data.u}`, dec(p.data.c));
                }
            });
            chanMain.subscribe('del', p => document.getElementById(p.data.id)?.remove());
            chanMain.subscribe('typing', p => { if(!activeDM && p.data.u !== user) { const ind = document.getElementById('typing-indicator'); ind.innerText = `${p.data.u} is typing...`; ind.style.opacity = '1'; clearTimeout(typingTimeout); typingTimeout = setTimeout(() => ind.style.opacity = '0', 2000); } });

            chanMain.presence.subscribe(() => syncPres()); chanMain.presence.enter({ pfp: pfp });

            chanDM = client.channels.get('pl-dm-' + user);
            chanDM.subscribe('msg', p => ingest(p.data, true, false));

            initCanvas(); checkCD(); initVoice();
        }

        function syncPres() {
            chanMain.presence.get((err, m) => {
                if(err) return; const l = document.getElementById('online-list'); l.innerHTML = '';
                let uMap = new Map(); m.forEach(x => uMap.set(x.clientId, x.data));
                uMap.forEach((d, id) => {
                    let img = d?.pfp ? `<img src="${d.pfp}" style="width:28px; height:28px; border-radius:8px; object-fit:cover; border:1.5px solid var(--accent);">` : `<div class="status-orb"></div>`;
                    let al = unreadDMs.has(id) ? 'display:block;' : ''; let clk = id !== user ? `onclick="openDM('${id}')"` : '';
                    let inVoice = voicePeers.has(id) || (voiceActive && id === user);
                    let ring = inVoice ? `<div class="voice-ring ${speakingSet.has(id)?'speaking':''}" id="ring-${cssSafe(id)}"></div>` : '';
                    l.innerHTML += `<div class="user-node ${id===user?'me':''} ${inVoice?'in-voice':''}" ${clk}>${img} <span>${id}</span> ${ring} <div class="dm-alert" style="${al}"></div></div>`;
                });
            });
        }
        function cssSafe(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

        // DM ROUTING
        function openDM(t) { activeDM = t; unreadDMs.delete(t); syncPres(); document.getElementById('chat-title').innerText = "DM: " + t; document.getElementById('dm-back').style.display = 'block'; document.getElementById('view').innerHTML = ''; loadLocalHistoryDM(t); }
        function closeDM() { activeDM = null; document.getElementById('chat-title').innerText = "Main Lobby"; document.getElementById('dm-back').style.display = 'none'; document.getElementById('view').innerHTML = '';
            chanMain.history({limit: 50}, (err, page) => { if(!err && page.items) { page.items.reverse().forEach(item => { if(item.name === 'msg') ingest(item.data, false, true); if(item.name === 'announce' && !receivedIds.has(item.data.id)) { receivedIds.add(item.data.id); renderAnnounce(dec(item.data.c), item.data.u, item.data.t); } }); } else { loadLocalHistoryGlobal(); } });
        }

        function ingest(d, isDM, isHistory = false) {
            if(receivedIds.has(d.id)) return; receivedIds.add(d.id);
            let messageText = dec(d.c); if (messageText === "[Sketch Data]") messageText = "sent a sketch.";

            if(isDM) {
                if(activeDM === d.u) { renBub(d); saveL('dm_'+d.u, d); }
                else { unreadDMs.add(d.u); syncPres(); saveL('dm_'+d.u, d); if(!isHistory) sendDesktopNotification(`DM from ${d.u}`, messageText, d.pfp); }
            } else {
                if(!activeDM) renBub(d);
                if(!isDM) saveL('global', d);
                if(!isHistory && d.u !== user) sendDesktopNotification(`${d.u} (Lobby)`, messageText, d.pfp);
            }
            if(!isHistory && d.u !== user) playSnd('in');
        }

        function sendTyping() { if(!activeDM) chanMain.publish('typing', { u: user }); }

        function push() {
            const i = document.getElementById('msg-input'); if(!i.value) return;
            const id = 'msg_' + Date.now(); const t = Date.now(); const pfp = localStorage.getItem('pl_pfp');
            const pld = { id, u: user, c: enc(i.value), pfp, t };
            receivedIds.add(id);
            if(activeDM) { client.channels.get('pl-dm-'+activeDM).publish('msg', pld); saveL('dm_'+activeDM, pld); }
            else { chanMain.publish('msg', pld); saveL('global', pld); }
            renBub(pld); i.value = ''; playSnd('out');
        }

        function sendAnnounce() {
            const i = document.getElementById('msg-input'); if(!i.value || activeDM) return;
            if(localStorage.getItem('pl_cd') && Date.now() - parseInt(localStorage.getItem('pl_cd')) < 60000) return;
            const id = 'ann_' + Date.now(); const t = Date.now();
            const pld = { id, u: user, c: enc(i.value), t, type: 'ann' };
            receivedIds.add(id); chanMain.publish('announce', pld); saveL('global', pld);
            renderAnnounce(i.value, 'You', t); i.value = ''; playSnd('out');
            localStorage.setItem('pl_cd', t); checkCD();
        }

        function checkCD() { const b = document.getElementById('announce-btn'); const l = localStorage.getItem('pl_cd'); if(l && Date.now() - parseInt(l) < 60000) { b.style.opacity='0.2'; b.style.pointerEvents='none'; setTimeout(checkCD, 1000); } else { b.style.opacity='0.6'; b.style.pointerEvents='auto'; } }

        function renBub(d) {
            if(document.getElementById(d.id)) return;
            const me = d.u === user; const time = new Date(d.t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); const txt = dec(d.c);
            const div = document.createElement('div'); div.className = `bubble-wrap ${me ? 'me' : 'them'}`; div.id = d.id;
            let html = `<div class="bubble-meta">${!me&&d.pfp?`<img src="${d.pfp}" class="meta-pfp">`:''}<span>${me?'You':d.u}</span><span class="msg-time">${time}</span></div><div class="bubble">${parseLks(txt)}${d.img?`<img src="${d.img}">`:''}${me?`<div class="del-btn" onclick="nuke('${d.id}')"><i class="fas fa-times"></i></div>`:''}</div>`;
            div.innerHTML = html; const v = document.getElementById('view'); v.appendChild(div); v.scrollTop = v.scrollHeight;
        }

        function renderAnnounce(txt, s, t) {
            const time = new Date(t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const div = document.createElement('div'); div.className = 'announcement';
            div.innerHTML = `<div style="font-size:0.68rem; opacity:0.8; margin-bottom:7px; letter-spacing:1px; font-family: var(--font-mono);"><i class="fas fa-tower-broadcast"></i> ${s} • ${time}</div>${parseLks(txt)}`;
            const v = document.getElementById('view'); v.appendChild(div); v.scrollTop = v.scrollHeight;
        }

        function parseLks(t) { return t.replace(/(https?:\/\/[^\s]+)/g, u => `<a href="${u}" target="_blank" style="color:inherit; text-decoration:underline;">${u.substring(0,35)}...</a>`); }

        function nuke(id) { document.getElementById(id)?.remove(); if(!activeDM) chanMain.publish('del', {id}); let k = activeDM ? 'pl_dm_'+activeDM : 'pl_global'; let h = JSON.parse(localStorage.getItem(k)) || []; localStorage.setItem(k, JSON.stringify(h.filter(m => m.id !== id))); }

        // LOCAL STORAGE BACKUPS
        function saveL(k, p) { let h = JSON.parse(localStorage.getItem('pl36_'+k)) || []; h.push(p); localStorage.setItem('pl36_'+k, JSON.stringify(h.slice(-50))); }
        function loadLocalHistoryGlobal() { let h = JSON.parse(localStorage.getItem('pl36_global')) || []; h.forEach(d => { receivedIds.add(d.id); if(d.type==='ann') renderAnnounce(dec(d.c), d.u===user?'You':d.u, d.t); else renBub(d); }); }
        function loadLocalHistoryDM(t) { let h = JSON.parse(localStorage.getItem('pl36_dm_'+t)) || []; h.forEach(d => { receivedIds.add(d.id); renBub(d); }); }

        // SKETCH
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'); let drawing = false;
        function initCanvas() { const w = document.getElementById('sketch-wrap'); canvas.width = w.clientWidth; canvas.height = w.clientHeight; ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.lineCap = 'round'; canvas.onmousedown = e => { drawing=true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); }; canvas.onmousemove = e => { if(drawing){ctx.lineTo(e.offsetX,e.offsetY); ctx.stroke();} }; window.addEventListener('mouseup', ()=>drawing=false); canvas.ontouchstart = e => { drawing=true; ctx.beginPath(); const r=canvas.getBoundingClientRect(); ctx.moveTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); }; canvas.ontouchmove = e => { if(drawing){const r=canvas.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); ctx.stroke();} }; window.addEventListener('touchend', ()=>drawing=false); }
        function broadcastSketch() { const id = 'sk_'+Date.now(); const t = Date.now(); const pfp = localStorage.getItem('pl_pfp'); const pld = { id, u: user, c: enc("[Sketch Data]"), img: canvas.toDataURL(), pfp, t }; receivedIds.add(id); if(activeDM){client.channels.get('pl-dm-'+activeDM).publish('msg', pld); saveL('dm_'+activeDM, pld);} else{chanMain.publish('msg', pld); saveL('global', pld);} renBub(pld); playSnd('out'); ctx.clearRect(0,0,canvas.width,canvas.height); }

        // ===== VOICE CHAT (mesh WebRTC, signaled over Ably) =====
        let chanVoicePresence, chanVoiceSignal;
        let localStream = null, voiceActive = false, muted = false, deafened = false;
        const voicePeers = new Map(); // id -> { pc, audioEl, analyser, raf }
        const speakingSet = new Set();
        const ICE_SERVERS = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        function initVoice() {
            chanVoicePresence = client.channels.get('pl-voice-presence');
            chanVoiceSignal = client.channels.get('pl-voice-signal');

            chanVoicePresence.presence.subscribe('enter', m => { if(voiceActive && m.clientId !== user) connectToPeer(m.clientId, true); syncPres(); renderVoiceBar(); });
            chanVoicePresence.presence.subscribe('leave', m => { removePeer(m.clientId); syncPres(); renderVoiceBar(); });

            chanVoiceSignal.subscribe('signal', p => {
                const d = p.data;
                if(d.to !== user) return;
                handleSignal(d);
            });
        }

        async function joinVoice() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
            } catch(e) {
                alert("Couldn't access your microphone. Check your browser permissions.");
                return;
            }
            voiceActive = true;
            document.getElementById('join-voice-btn').classList.add('hidden');
            document.getElementById('voice-bar').classList.add('active');
            watchLocalLevel();

            chanVoicePresence.presence.get((err, members) => {
                if(!err) members.forEach(m => { if(m.clientId !== user) connectToPeer(m.clientId, true); });
                chanVoicePresence.presence.enter({});
                syncPres(); renderVoiceBar();
            });
        }

        function leaveVoice() {
            voiceActive = false;
            voicePeers.forEach((_, id) => removePeer(id));
            if(localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            chanVoicePresence.presence.leave();
            document.getElementById('join-voice-btn').classList.remove('hidden');
            document.getElementById('voice-bar').classList.remove('active');
            speakingSet.clear();
            syncPres(); renderVoiceBar();
        }

        function connectToPeer(id, isInitiator) {
            if(voicePeers.has(id)) return;
            const pc = new RTCPeerConnection(ICE_SERVERS);
            const entry = { pc, audioEl: null, analyser: null, raf: null };
            voicePeers.set(id, entry);

            if(localStream) localStream.getTracks().forEach(tr => pc.addTrack(tr, localStream));

            pc.onicecandidate = e => { if(e.candidate) sendSignal(id, 'ice', e.candidate); };
            pc.ontrack = e => {
                const audioEl = document.createElement('audio');
                audioEl.autoplay = true; audioEl.srcObject = e.streams[0]; audioEl.muted = deafened;
                audioEl.style.display = 'none'; document.body.appendChild(audioEl);
                entry.audioEl = audioEl;
                watchRemoteLevel(id, e.streams[0]);
            };
            pc.onconnectionstatechange = () => { if(['failed','closed','disconnected'].includes(pc.connectionState)) removePeer(id); };

            if(isInitiator) {
                pc.createOffer().then(offer => pc.setLocalDescription(offer).then(() => sendSignal(id, 'offer', offer)));
            }
        }

        function removePeer(id) {
            const entry = voicePeers.get(id);
            if(!entry) return;
            if(entry.raf) cancelAnimationFrame(entry.raf);
            if(entry.audioEl) entry.audioEl.remove();
            entry.pc.close();
            voicePeers.delete(id);
            speakingSet.delete(id);
            renderVoiceBar();
        }

        function sendSignal(to, type, payload) { chanVoiceSignal.publish('signal', { to, from: user, type, payload }); }

        async function handleSignal(d) {
            const { from, type, payload } = d;
            let entry = voicePeers.get(from);
            if(!entry && voiceActive) { connectToPeer(from, false); entry = voicePeers.get(from); }
            if(!entry) return;
            const pc = entry.pc;
            if(type === 'offer') {
                await pc.setRemoteDescription(new RTCSessionDescription(payload));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                sendSignal(from, 'answer', answer);
            } else if(type === 'answer') {
                await pc.setRemoteDescription(new RTCSessionDescription(payload));
            } else if(type === 'ice') {
                try { await pc.addIceCandidate(new RTCIceCandidate(payload)); } catch(e) {}
            }
        }

        function toggleMute() {
            if(!localStream) return;
            muted = !muted;
            localStream.getAudioTracks().forEach(t => t.enabled = !muted);
            const b = document.getElementById('mute-btn');
            b.classList.toggle('on', !muted);
            b.innerHTML = muted ? '<i class="fas fa-microphone-slash"></i> Muted' : '<i class="fas fa-microphone"></i> Mute';
        }

        function toggleDeafen() {
            deafened = !deafened;
            voicePeers.forEach(e => { if(e.audioEl) e.audioEl.muted = deafened; });
            const b = document.getElementById('deafen-btn');
            b.classList.toggle('on', deafened);
            b.innerHTML = deafened ? '<i class="fas fa-volume-xmark"></i> Deafened' : '<i class="fas fa-volume-high"></i> Deafen';
            if(deafened && !muted) toggleMute();
        }

        function watchLocalLevel() {
            if(!localStream) return;
            const actx = new (window.AudioContext || window.webkitAudioContext)();
            const src = actx.createMediaStreamSource(localStream);
            const analyser = actx.createAnalyser(); analyser.fftSize = 512;
            src.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);
            function loop() {
                if(!voiceActive) return;
                analyser.getByteFrequencyData(data);
                const vol = data.reduce((a,b)=>a+b,0) / data.length;
                const isSpeaking = vol > 12 && !muted;
                setSpeaking(user, isSpeaking);
                requestAnimationFrame(loop);
            }
            loop();
        }

        function watchRemoteLevel(id, stream) {
            const entry = voicePeers.get(id); if(!entry) return;
            const actx = new (window.AudioContext || window.webkitAudioContext)();
            const src = actx.createMediaStreamSource(stream);
            const analyser = actx.createAnalyser(); analyser.fftSize = 512;
            src.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);
            function loop() {
                if(!voicePeers.has(id)) return;
                analyser.getByteFrequencyData(data);
                const vol = data.reduce((a,b)=>a+b,0) / data.length;
                setSpeaking(id, vol > 12);
                entry.raf = requestAnimationFrame(loop);
            }
            loop();
        }

        function setSpeaking(id, isSpeaking) {
            const was = speakingSet.has(id);
            if(isSpeaking === was) return;
            if(isSpeaking) speakingSet.add(id); else speakingSet.delete(id);
            renderVoiceBar();
            const ring = document.getElementById('ring-' + cssSafe(id));
            if(ring) ring.classList.toggle('speaking', isSpeaking);
            const chip = document.getElementById('vchip-' + cssSafe(id));
            if(chip) chip.classList.toggle('speaking', isSpeaking);
        }

        function renderVoiceBar() {
            const wrap = document.getElementById('voice-members');
            const ids = new Set([...(voiceActive ? [user] : []), ...voicePeers.keys()]);
            document.getElementById('voice-count').innerText = ids.size;
            wrap.innerHTML = '';
            ids.forEach(id => {
                const isMuted = id === user && muted;
                wrap.innerHTML += `<div class="voice-chip ${speakingSet.has(id)?'speaking':''} ${isMuted?'muted':''}" id="vchip-${cssSafe(id)}"><div class="vc-dot">${isMuted?'':'<i class=\"fas fa-headset\" style=\"font-size:0.6rem;\"></i>'}</div>${id === user ? 'You' : id}</div>`;
            });
        }

        // UI & SETTINGS
        function toggleStealth() { document.getElementById('dock').classList.toggle('hidden'); document.getElementById('dock-reveal').classList.toggle('visible'); }
        function toggleCC() { const cc = document.getElementById('cc'), p = document.getElementById('cc-p'); if(cc.style.display === 'flex') { p.style.transform='scale(0.92) translateY(40px)'; cc.style.opacity='0'; setTimeout(()=>cc.style.display='none',400); } else { cc.style.display='flex'; setTimeout(()=>{cc.style.opacity='1'; p.style.transform='scale(1) translateY(0)';},10); } }
        function setMode(m, b) { document.getElementById('ui').className = 'nexus-grid mode-'+m; document.querySelectorAll('.dock-btn').forEach(t=>t.classList.remove('active')); b.classList.add('active'); setTimeout(initCanvas, 500); }
        function toggleTheme() { const b = document.body; b.setAttribute('data-theme', b.getAttribute('data-theme')==='light'?'dark':'light'); localStorage.setItem('pl_theme', b.getAttribute('data-theme')); }

        function setCol(h, el) { document.documentElement.style.setProperty('--accent', h); let r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h); if(r) { document.documentElement.style.setProperty('--accent-glow', `rgba(${parseInt(r[1],16)}, ${parseInt(r[2],16)}, ${parseInt(r[3],16)}, 0.28)`); document.documentElement.style.setProperty('--accent-strong', `rgba(${parseInt(r[1],16)}, ${parseInt(r[2],16)}, ${parseInt(r[3],16)}, 0.65)`); } document.querySelectorAll('.c-dot').forEach(d=>d.classList.remove('active')); if(el) el.classList.add('active'); localStorage.setItem('pl_color', h); }
        function handleBg(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('bg-canvas').style.backgroundImage = `url(${e.target.result})`; localStorage.setItem('pl_bg', e.target.result); }; r.readAsDataURL(i.files[0]); } }
        function handlePfp(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => { const img = new Image(); img.onload = () => { const c = document.createElement('canvas'), ctx = c.getContext('2d'); c.width=100; c.height=100; ctx.drawImage(img,0,0,100,100); const b64 = c.toDataURL('image/jpeg', 0.5); localStorage.setItem('pl_pfp', b64); document.getElementById('local-pfp').src=b64; document.getElementById('local-pfp').style.display='block'; if(chanMain) chanMain.presence.update({pfp: b64}); }; img.src=e.target.result; }; r.readAsDataURL(i.files[0]); } }

        function loadSettings() {
            const bg = localStorage.getItem('pl_bg'); if(bg) document.getElementById('bg-canvas').style.backgroundImage = `url(${bg})`;
            if(localStorage.getItem('pl_theme') === 'light') document.body.setAttribute('data-theme', 'light');
            const col = localStorage.getItem('pl_color'); if(col) { const dots = document.querySelectorAll('.c-dot'); let match = Array.from(dots).find(d=>d.style.background.includes(col)); setCol(col, match||dots[0]); }
            const snd = localStorage.getItem('pl_snd'); if(snd !== null) { soundEnabled = snd === 'true'; const sb = document.getElementById('snd-btn'); sb.innerText = soundEnabled?'ON':'OFF'; sb.style.background = soundEnabled?'var(--accent)':'rgba(255,255,255,0.08)'; sb.style.color = soundEnabled?'#050505':'var(--text-color)'; }
            const op = localStorage.getItem('pl_op'); if(op) document.documentElement.style.setProperty('--glass-op', op/100);
            const bl = localStorage.getItem('pl_blur'); if(bl) document.documentElement.style.setProperty('--glass-blur', bl+'px');
            const fnt = localStorage.getItem('pl_fnt'); if(fnt) document.documentElement.style.setProperty('--font-body', fnt);
        }

        function enc(t) { return CryptoJS.AES.encrypt(t, secret).toString(); }
        function dec(c) { try { return CryptoJS.AES.decrypt(c, secret).toString(CryptoJS.enc.Utf8); } catch { return "[Encrypted]"; } }
    </script>
